name: Push to ECR and Update Lambda to Latest

on:
  paths:
    - lambda/**
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533266997703:role/ECRPushPhotoLambdaRole
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build and push image
        run: |
          docker build -t photos/image-processor:$IMAGE_TAG ./lambda
          docker tag photos/image-processor:$IMAGE_TAG \
          533266997703.dkr.ecr.us-east-1.amazonaws.com/photos/image-processor:$IMAGE_TAG
          docker push 533266997703.dkr.ecr.us-east-1.amazonaws.com/photos/image-processor:$IMAGE_TAG

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name photo-processor \
            --image-uri 533266997703.dkr.ecr.us-east-1.amazonaws.com/photos/image-processor:$IMAGE_TAG
