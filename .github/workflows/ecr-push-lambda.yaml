name: Push to Backend Prod ECR

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::533266997703:role/ECRPushPhotoLambdaRole
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        run: |
          docker build -t photos/image-processor ./lambda
          docker tag photos/image-processor:latest 533266997703.dkr.ecr.us-east-1.amazonaws.com/photos/image-processor:latest
          docker push 533266997703.dkr.ecr.us-east-1.amazonaws.com/photos/image-processor:latest
